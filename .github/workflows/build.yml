name: Build ElyTrap Mod

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
  release:
    types: [created]
  workflow_dispatch: # Manuel tetikleme

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Kodu çek ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Java 21 kur ───────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle cache (hızlandırır) ────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Gradle wrapper'a izin ver ─────────────────────────────
      - name: Grant Gradle Execute Permission
        run: chmod +x gradlew

      # ── 5. Build ─────────────────────────────────────────────────
      - name: Build Mod JAR
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      # ── 6. JAR'ı artifact olarak kaydet ─────────────────────────
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElyTrap-${{ github.ref_name }}-${{ github.run_number }}
          path: build/libs/*.jar
          retention-days: 30
          if-no-files-found: error

      # ── 7. Build başarı mesajı ───────────────────────────────────
      - name: Build Success
        run: |
          echo "✅ ElyTrap başarıyla derlendi!"
          echo "JAR dosyası: build/libs/ klasöründe"
          ls -la build/libs/

  # ── Release'de otomatik upload ───────────────────────────────────
  release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant Gradle Execute Permission
        run: chmod +x gradlew

      - name: Build Release JAR
        run: ./gradlew build --no-daemon

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
